<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Six-Sided Saga - Three.js 角色测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Microsoft YaHei', sans-serif; }
    #three-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    #hud-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; pointer-events: none;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .hud-top {
      background: rgba(10,8,4,0.9); border-bottom: 1px solid #333;
      padding: 6px 12px; display: flex; justify-content: space-between; align-items: center;
      pointer-events: auto;
    }
    .hud-top .stats { display: flex; gap: 12px; color: #fc6; font-size: 12px; }
    .hud-top .zone { color: #f96; font-size: 13px; font-weight: bold; }
    .char-switcher {
      display: flex; justify-content: center; gap: 8px; padding: 8px; pointer-events: auto;
    }
    .char-btn {
      background: linear-gradient(180deg, #2a1a0a, #1a0e06);
      border: 2px solid #666; border-radius: 6px;
      color: #aaa; font-size: 11px; padding: 6px 14px;
      cursor: pointer; transition: all .2s;
    }
    .char-btn:hover, .char-btn.active { border-color: #f63; color: #fc6; background: linear-gradient(180deg, #3a1a0a, #2a0e06); }
    .hud-bottom {
      background: rgba(10,8,4,0.95); border-top: 2px solid #c44;
      pointer-events: auto; display: flex; flex-direction: column;
    }
    .skill-bar { display: flex; justify-content: center; padding: 6px 12px; gap: 8px; }
    .skill-btn {
      background: linear-gradient(180deg, #3a1a0a, #2a0e06);
      border: 2px solid #e63; border-radius: 6px;
      color: #fc6; font-size: 13px; font-weight: bold; padding: 8px 20px; cursor: pointer;
    }
    .char-info {
      display: flex; align-items: center; padding: 6px 12px; gap: 10px; border-top: 1px solid #333;
    }
    .char-info .name { color: #f88; font-size: 13px; font-weight: bold; }
    .bar-wrap { flex: 1; }
    .bar { height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-bottom: 3px; }
    .bar-hp { width: 80%; height: 100%; background: linear-gradient(90deg, #2a2, #4c4); }
    .bar-mp { width: 60%; height: 100%; background: linear-gradient(90deg, #26c, #48f); }
    .char-info .round { color: #888; font-size: 11px; }
    .dice-area { display: flex; justify-content: center; padding: 10px; gap: 12px; border-top: 1px solid #333; }
    .dice {
      width: 56px; height: 56px; background: linear-gradient(135deg, #ddd, #999);
      border: 3px solid #666; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: bold; color: #333; cursor: pointer; transition: transform .15s;
    }
    .dice:hover { transform: scale(1.1); border-color: #fc6; }
    .action-bar { display: flex; padding: 8px 12px; gap: 10px; border-top: 1px solid #555; }
    .btn-reroll {
      background: linear-gradient(180deg, #333, #222); border: 2px solid #666;
      border-radius: 8px; color: #aaa; font-size: 12px; padding: 10px 14px; cursor: pointer;
    }
    .btn-play {
      flex: 1; background: linear-gradient(180deg, #c30, #900); border: 2px solid #f63;
      border-radius: 8px; color: #fff; font-size: 15px; font-weight: bold; padding: 10px 20px; cursor: pointer;
    }
    .btn-bag {
      background: linear-gradient(180deg, #333, #222); border: 2px solid #666;
      border-radius: 8px; color: #aaa; font-size: 12px; padding: 10px 14px; cursor: pointer;
    }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: #0a0a0a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fc6; font-size: 16px; gap: 12px; transition: opacity .5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #fc6; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .anim-label {
      position: fixed; top: 50px; left: 50%; transform: translateX(-50%); z-index: 20;
      color: #fc6; font-size: 12px; background: rgba(0,0,0,0.7); padding: 4px 12px;
      border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity .3s;
    }
    .anim-label.show { opacity: 1; }
  </style>
</head>
<body>
<canvas id="three-canvas"></canvas>
<div id="loading"><div class="spinner"></div><div>Loading Models...</div></div>
<div class="anim-label" id="anim-label"></div>
<div id="hud-overlay">
  <div>
    <div class="hud-top">
      <div class="stats"><span>gold 186</span><span>floor 8</span><span>atk 8</span></div>
      <span class="zone">Dark Forest - 3D Test</span>
    </div>
    <div class="char-switcher">
      <button class="char-btn active" data-model="orc_chieftain">Orc Chief</button>
      <button class="char-btn" data-model="Skeleton_Warrior">Warrior</button>
      <button class="char-btn" data-model="Skeleton_Mage">Mage</button>
      <button class="char-btn" data-model="Skeleton_Rogue">Rogue</button>
      <button class="char-btn" data-model="Skeleton_Minion">Minion</button>
    </div>
  </div>
  <div style="flex:1"></div>
  <div class="hud-bottom">
    <div class="skill-bar">
      <button class="skill-btn" id="btn-prev-anim">Prev Anim</button>
      <button class="skill-btn" id="btn-next-anim">Next Anim</button>
    </div>
    <div class="char-info">
      <span class="name">Skeleton Warrior</span>
      <div class="bar-wrap">
        <div class="bar"><div class="bar-hp"></div></div>
        <div class="bar"><div class="bar-mp"></div></div>
      </div>
      <span class="round">R1</span>
    </div>
    <div class="dice-area">
      <div class="dice">4</div><div class="dice">1</div><div class="dice">3</div>
    </div>
    <div class="action-bar">
      <button class="btn-reroll">Reroll x1</button>
      <button class="btn-play" id="btn-rotate">Auto Rotate</button>
      <button class="btn-bag">Bag 0</button>
    </div>
  </div>
</div>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();

const bgCanvas = document.createElement('canvas');
bgCanvas.width = 2; bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const grad = bgCtx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0, '#1a0e2e');
grad.addColorStop(0.4, '#0d1117');
grad.addColorStop(1, '#0a0806');
bgCtx.fillStyle = grad;
bgCtx.fillRect(0, 0, 2, 512);
scene.background = new THREE.CanvasTexture(bgCanvas);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 5.5);

const controls = new OrbitControls(camera, canvas);
controls.target.set(0, 0.8, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2;
controls.maxDistance = 8;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

scene.add(new THREE.AmbientLight(0x404060, 0.6));

const mainLight = new THREE.DirectionalLight(0xffaa66, 1.8);
mainLight.position.set(3, 5, 4);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(1024, 1024);
mainLight.shadow.camera.near = 0.5;
mainLight.shadow.camera.far = 20;
mainLight.shadow.camera.left = -3;
mainLight.shadow.camera.right = 3;
mainLight.shadow.camera.top = 3;
mainLight.shadow.camera.bottom = -1;
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0x6688cc, 0.5); fillLight.position.set(-3, 3, -2); scene.add(fillLight);
const bounceLight = new THREE.PointLight(0x442200, 0.4, 10); bounceLight.position.set(0, -0.5, 1); scene.add(bounceLight);

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(3, 64),
  new THREE.MeshStandardMaterial({ color: 0x1a1410, roughness: 0.9, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const ring = new THREE.Mesh(
  new THREE.RingGeometry(2.8, 3.0, 64),
  new THREE.MeshBasicMaterial({ color: 0x331100, side: THREE.DoubleSide })
);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.001;
scene.add(ring);

const particleCount = 60;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const particleSpeeds = [];
for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 6;
  positions[i * 3 + 1] = Math.random() * 3 + 0.2;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 6;
  particleSpeeds.push({ x: (Math.random() - 0.5) * 0.003, y: (Math.random() - 0.5) * 0.002, z: (Math.random() - 0.5) * 0.003 });
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0xffcc44, size: 0.04, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, depthWrite: false });
scene.add(new THREE.Points(particleGeo, particleMat));

const loader = new GLTFLoader();
let currentModel = null;
let mixer = null;
let animations = [];
let currentAnimIndex = 0;
let autoRotate = true;

const MODEL_BASE = './models/';
const ANIM_FILES = ['Rig_Medium_General.glb', 'Rig_Medium_MovementBasic.glb'];

let animClips = [];

// Bone name mapping: KayKit -> Orc Chieftain (UE Mannequin style)
const BONE_MAP = {
  'root': 'root',
  'hips': 'pelvis',
  'spine': 'spine_01',
  'chest': 'spine_03',
  'head': 'head',
  'upperleg.l': 'thigh_l', 'lowerleg.l': 'calf_l', 'foot.l': 'foot_l', 'toes.l': 'ball_l',
  'upperleg.r': 'thigh_r', 'lowerleg.r': 'calf_r', 'foot.r': 'foot_r', 'toes.r': 'ball_r',
  'upperarm.l': 'upperarm_l', 'lowerarm.l': 'lowerarm_l', 'wrist.l': 'hand_l', 'hand.l': 'hand_l',
  'upperarm.r': 'upperarm_r', 'lowerarm.r': 'lowerarm_r', 'wrist.r': 'hand_r', 'hand.r': 'hand_r',
  'handslot.l': 'hand_l', 'handslot.r': 'hand_r'
};

function retargetAnimations(clips) {
  // Bones to skip retargeting (root orientation differs between skeletons)
  const SKIP_BONES = ['root', 'hips'];
  return clips.map(clip => {
    const newTracks = clip.tracks.map(track => {
      const parts = track.name.split('.');
      const prop = parts.pop();
      const boneName = parts.join('.');
      // Only retarget quaternion tracks, skip position/scale
      if (prop !== 'quaternion') return null;
      // Skip root/hips rotation - orientation basis differs
      if (SKIP_BONES.includes(boneName)) return null;
      const mappedBone = BONE_MAP[boneName];
      if (mappedBone) {
        const newTrack = track.clone();
        newTrack.name = mappedBone + '.' + prop;
        return newTrack;
      }
      return null;
    }).filter(t => t !== null);
    return new THREE.AnimationClip(clip.name, clip.duration, newTracks);
  });
}

async function loadAnimations() {
  for (const file of ANIM_FILES) {
    try {
      const gltf = await new Promise((res, rej) => loader.load(MODEL_BASE + file, res, undefined, rej));
      if (gltf.animations?.length) animClips.push(...gltf.animations);
    } catch (e) { console.warn('Anim load fail:', file, e); }
  }
  console.log('Loaded ' + animClips.length + ' animation clips');
}

async function loadModel(name) {
  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse(c => { if (c.isMesh) { c.geometry?.dispose(); if (Array.isArray(c.material)) c.material.forEach(m => m.dispose()); else c.material?.dispose(); } });
  }
  if (mixer) { mixer.stopAllAction(); mixer = null; }

  try {
    const gltf = await new Promise((res, rej) => loader.load(MODEL_BASE + name + '.glb', res, undefined, rej));
    const model = gltf.scene;
    // Load PBR textures for orc models
    const textureLoader = new THREE.TextureLoader();
    const textureSets = {
      'orc_chieftain': { albedo: 'orc_chieftain_albedo.png', metal: 'orc_chieftain_metal.png', rough: 'orc_chieftain_rough.png' }
    };
    const texSet = textureSets[name];
    let albedoTex = null, metalTex = null, roughTex = null;
    if (texSet) {
      const texPath = MODEL_BASE + 'textures/';
      albedoTex = textureLoader.load(texPath + texSet.albedo);
      albedoTex.flipY = false;
      albedoTex.colorSpace = THREE.SRGBColorSpace;
      metalTex = textureLoader.load(texPath + texSet.metal);
      metalTex.flipY = false;
      roughTex = textureLoader.load(texPath + texSet.rough);
      roughTex.flipY = false;
    }

    model.traverse(c => {
      if (c.isMesh) {
        c.castShadow = true; c.receiveShadow = true;
        if (texSet) {
          c.material = new THREE.MeshStandardMaterial({
            map: albedoTex,
            metalnessMap: metalTex,
            roughnessMap: roughTex,
            metalness: 1.0,
            roughness: 1.0
          });
        } else if (c.material?.map) {
          c.material.map.magFilter = THREE.NearestFilter;
          c.material.map.minFilter = THREE.NearestFilter;
        }
      }
    });
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    model.position.sub(center);
    model.position.y += size.y / 2;
    const scale = 1.4 / Math.max(size.x, size.y, size.z);
    model.scale.setScalar(scale);
    model.position.multiplyScalar(scale);
    scene.add(model);
    currentModel = model;

    // Retarget animations if loading orc model (different skeleton naming)
    const isOrc = name.toLowerCase().includes('orc');
    const retargetedClips = isOrc ? retargetAnimations(animClips) : animClips;
    animations = [...(gltf.animations || []), ...retargetedClips];
    if (animations.length > 0) { mixer = new THREE.AnimationMixer(model); currentAnimIndex = 0; playAnimation(0); }
    document.querySelector('.char-info .name').textContent = name.replace('Skeleton_', '');
  } catch (e) { console.error('Model load fail:', e); }
}

function playAnimation(index) {
  if (!mixer || !animations.length) return;
  mixer.stopAllAction();
  currentAnimIndex = ((index % animations.length) + animations.length) % animations.length;
  const clip = animations[currentAnimIndex];
  mixer.clipAction(clip).reset().fadeIn(0.3).play();
  const label = document.getElementById('anim-label');
  label.textContent = clip.name + ' (' + (currentAnimIndex + 1) + '/' + animations.length + ')';
  label.classList.add('show');
  clearTimeout(label._timer);
  label._timer = setTimeout(() => label.classList.remove('show'), 2000);
}

async function init() {
  await loadAnimations();
  await loadModel('orc_chieftain');
  document.getElementById('loading').classList.add('hidden');
}
init();

document.querySelectorAll('.char-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadModel(btn.dataset.model);
  });
});
document.getElementById('btn-prev-anim').addEventListener('click', () => playAnimation(currentAnimIndex - 1));
document.getElementById('btn-next-anim').addEventListener('click', () => playAnimation(currentAnimIndex + 1));
document.getElementById('btn-rotate').addEventListener('click', () => {
  autoRotate = !autoRotate;
  document.getElementById('btn-rotate').textContent = autoRotate ? 'Stop Rotate' : 'Auto Rotate';
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.elapsedTime;
  if (mixer) mixer.update(delta);
  if (currentModel && autoRotate) currentModel.rotation.y += delta * 0.5;
  const posArr = particleGeo.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    posArr[i*3] += particleSpeeds[i].x + Math.sin(elapsed+i)*0.001;
    posArr[i*3+1] += particleSpeeds[i].y + Math.cos(elapsed*0.7+i)*0.0005;
    posArr[i*3+2] += particleSpeeds[i].z;
    if (Math.abs(posArr[i*3]) > 3) particleSpeeds[i].x *= -1;
    if (posArr[i*3+1] > 3.5 || posArr[i*3+1] < 0.1) particleSpeeds[i].y *= -1;
    if (Math.abs(posArr[i*3+2]) > 3) particleSpeeds[i].z *= -1;
  }
  particleGeo.attributes.position.needsUpdate = true;
  particleMat.opacity = 0.4 + Math.sin(elapsed*2)*0.2;
  mainLight.intensity = 1.8 + Math.sin(elapsed*1.5)*0.2;
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
